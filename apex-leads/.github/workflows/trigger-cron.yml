name: Trigger Cron After Deploy

on:
  push:
    branches: [main]

jobs:
  trigger-leads-cron:
    name: Trigger leads-pendientes after Vercel deploy
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Vercel production deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          PROJECT_ID="prj_h6gFiShNAp9Ja5foPk98zqOdBbm7"
          TEAM_ID="team_howttfzs3Q44mOpVn93EkrUm"
          echo "Waiting for deployment to be READY..."

          for attempt in $(seq 1 24); do
            STATE=$(curl -sf \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=${PROJECT_ID}&teamId=${TEAM_ID}&limit=1&target=production" \
              2>/dev/null \
              | grep -o '"state":"[^"]*"' | head -1 \
              | tr -d '"' | cut -d: -f2)

            [ -z "$STATE" ] && STATE="UNKNOWN"
            echo "Attempt $attempt/24 — state: $STATE"

            if [ "$STATE" = "READY" ]; then
              echo "✓ Deployment is READY"
              break
            fi
            if [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
              echo "✗ Deployment failed with: $STATE"
              exit 1
            fi

            sleep 15
          done

      - name: Trigger leads-pendientes cron (force=true)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "--- Triggering cron with force=true ---"

          for attempt in 1 2 3; do
            echo ""
            echo "=== Attempt $attempt ==="
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer $CRON_SECRET" \
              "https://apex-leads-six.vercel.app/api/cron/leads-pendientes?force=true")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)

            echo "HTTP: $HTTP_CODE"
            echo "Body: $BODY"

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Cron triggered successfully"
              exit 0
            fi

            if [ "$HTTP_CODE" = "401" ]; then
              echo "✗ Unauthorized — verificá que CRON_SECRET en GitHub coincida con el de Vercel"
            fi

            [ $attempt -lt 3 ] && sleep 20
          done

          echo "⚠ Cron trigger failed after 3 attempts (non-blocking)"
          exit 0
