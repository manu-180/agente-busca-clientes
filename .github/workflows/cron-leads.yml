name: Cron Leads Pendientes

on:
  schedule:
    - cron: '* * * * *'  # Cada 1 min (GitHub ejecuta ~cada 5 min como mínimo real)
  workflow_dispatch:      # Disparo manual desde GitHub UI

jobs:
  trigger-cron:
    name: Trigger leads-pendientes
    runs-on: ubuntu-latest

    steps:
      - name: Trigger cron endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://apex-leads-six.vercel.app/api/cron/leads-pendientes")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP: $HTTP_CODE"
          echo "Body: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "⚠ Cron respondió $HTTP_CODE"
            exit 1
          fi

          echo "✓ OK"
